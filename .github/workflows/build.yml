name: Auto Build Converter

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * 7'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies from script
      run: |
        powershell -ExecutionPolicy Bypass -File .\installResources.ps1
        pip install pyinstaller pyyaml

    - name: Compile EXE
      run: |
        pyinstaller --onefile --noconsole converter.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Converter-Windows-EXE
        path: dist/converter.exe
